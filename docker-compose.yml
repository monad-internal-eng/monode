version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    network_mode: host
    environment:
      - RUST_LOG=info
    volumes:
      # Mount the Monad event ring (read-only)
      # Note: Update the host path if your event ring is located elsewhere
      - /var/lib/hugetlbfs/user/monad/pagesize-2MB/event-rings:/var/lib/hugetlbfs/user/monad/pagesize-2MB/event-rings:ro
      # Optional: Persistent logs volume
      - logs:/var/log/eventwatch
    restart: unless-stopped
    command: ["--server-addr", "0.0.0.0:8443", "--health-server-addr", "0.0.0.0:443"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://0.0.0.0:443/health | grep -q '\"success\": true'"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  logs:
