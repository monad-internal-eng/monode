name: Lint

on:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache Biome
        uses: actions/cache@v4
        with:
          path: ~/.cache/biome
          key: biome-${{ runner.os }}-${{ hashFiles('biome.json') }}
          restore-keys: |
            biome-${{ runner.os }}-
      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: 2.1.2
      - name: Run Biome
        run: biome ci --linter-enabled=true --formatter-enabled=true
